services:
  wms-pgvector:
    image: pgvector/pgvector:0.8.5-pg17
    container_name: wms-pgvector
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: wms_ai
      POSTGRES_USER: wms_ai
      POSTGRES_PASSWORD: wms_ai_password
      TZ: Asia/Tokyo
    volumes:
      - wms_pgvector_data:/var/lib/postgresql/data
      - ./docker/pgvector/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wms_ai -d wms_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  wms_pgvector_data: