# Test-classpath only (never packaged into the app jar). Activates the `test` profile for EVERY
# @SpringBootTest so tests load application-test.yml and point at wms_system_test — this is what stops
# a test that forgets to override the datasource from booting against the default dev DB (wms_system).
# Set here (base application.properties, not a profile document) so profile activation is honoured;
# different filename than the main application.yml, so the main config is merged, not shadowed.
spring.profiles.active=test
