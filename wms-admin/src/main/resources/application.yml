spring:
  application:
    name: wms-admin

  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
        service: ${spring.application.name}
        namespace: public
        group: DEFAULT_GROUP

  profiles:
    default: dev
    group:
      dev:
        - ai
  # Schema is now versioned by Flyway (classpath:db/migration). The old schema.sql/data.sql auto-run
  # is disabled — mode:never — so Spring Boot never executes ad-hoc init SQL again.
  sql:
    init:
      mode: never

  flyway:
    # No explicit url/user/password on purpose: Flyway follows the active profile's spring.datasource,
    # so dev migrates wms_system and test migrates wms_system_test (test isolation). A hardcoded
    # flyway.url would silently migrate that fixed DB regardless of profile.
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false
    # clean is a destructive "drop everything" operation — permanently disabled so it can never run.
    clean-disabled: true
    # NOTE: baseline-on-migrate / baseline-version are intentionally NOT set here. Adopting an
    # already-populated database (skipping V1) is a per-environment decision, enabled only in
    # application-dev.yml. An empty database runs V1/V2/V3 from scratch under any profile. Production
    # must set its baseline strategy deliberately after a backup — see docs/database-migration.md.
  jackson:
    time-zone: Asia/Tokyo

# Served under /wms in every environment. Gateway can expose this service under its external route
# (for example /api/wms) while WMS keeps one stable internal servlet context.
server:
  servlet:
    context-path: /wms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.example.wms: INFO

mybatis-plus:
  global-config:
    db-config:
      id-type: assign_id

springdoc:
  packages-to-scan: com.example.wms.admin.controller
  paths-to-match: /**

knife4j:
  enable: true
  setting:
    language: zh_cn

gateway:
  # Required for direct WMS access protection. Configure the same value in gateway-service forwarding.
  internal-token: local-dev-gateway-token

auth-service:
  base-url: ${AUTH_SERVICE_BASE_URL:http://127.0.0.1:8081/auth}
  application-code: WMS

wms:
  ai:
    system-prompt: >
      你是一个 WMS（仓储管理系统）智能助手。
      回答时优先使用简洁中文。
      如果用户没有提供足够的仓库、SKU、库存或订单上下文，先指出缺失信息，再给出建议。
      不要虚构系统实时数据，除非用户已经在问题中明确提供。
