spring:
  application:
    name: wms-admin
  datasource:
    url: jdbc:mysql://localhost:3306/wms_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
  jackson:
    time-zone: Asia/Shanghai

server:
  port: 8081
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.example.wms: INFO

mybatis-plus:
  global-config:
    db-config:
      id-type: assign_id

springdoc:
  packages-to-scan: com.example.wms.admin.controller
  paths-to-match: /**

knife4j:
  enable: true
  setting:
    language: zh_cn
