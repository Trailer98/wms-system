# dev profile — activate with --spring.profiles.active=dev
#
# Only dev is allowed to adopt an ALREADY-POPULATED database into Flyway: an existing dev DB that was
# built by the legacy schema.sql (before Flyway) gets stamped with a baseline at version 1 on first
# migrate — V1 is treated as already applied (existing tables are NOT rebuilt) and only V2+ run.
# An EMPTY dev DB is not baselined and runs V1/V2/V3 from scratch.
#
# NOT set globally (application.yml) on purpose, so production can never inherit baseline by accident.
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/wms_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Tokyo&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: Dev existing schema baseline


server:
  port: 8081
  # context-path (/api) is set globally in application.yml so every profile is consistent.
